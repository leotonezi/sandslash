allow-branch = ["master"]
tag-prefix = "v"
tag-name = "v{{version}}"
sign-tag = false
sign-commit = false
publish = false
push = true

pre-release-hook = ["git", "cliff", "--tag", "v{{version}}", "--output", "CHANGELOG.md"]

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "## \\[Unreleased\\]"
replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}"
exactly = 1

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "\\[unreleased\\]: https://github.com/leotonezi/sandslash/compare/v.+\\.\\.\\.HEAD"
replace = "[unreleased]: https://github.com/leotonezi/sandslash/compare/v{{version}}...HEAD\n[{{version}}]: https://github.com/leotonezi/sandslash/compare/{{prev_tag}}...v{{version}}"
exactly = 1
